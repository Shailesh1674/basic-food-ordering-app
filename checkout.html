<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Foodie Delight</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkout-container { display: flex; gap: 30px; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .checkout-form-section, .order-summary-section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .checkout-form-section { flex: 2; }
        .order-summary-section { flex: 1; height: fit-content; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .payment-methods { display: flex; gap: 15px; margin-bottom: 20px; }
        .payment-method { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 4px; text-align: center; cursor: pointer; }
        .payment-method.active { border-color: #ff4757; background: #fff0f1; }
        .payment-details { display: none; margin-bottom: 20px; }
        .payment-details.active { display: block; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .summary-total { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2em; border-top: 2px solid #ddd; padding-top: 15px; margin-top: 10px; }
        .btn-pay { width: 100%; font-size: 1.1em; padding: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="img/logo.png" alt="Logo" onerror="this.src=''; this.alt='🍔'">
                <h1>Foodie Delight</h1>
            </div>
            <nav>
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="checkout-container">
        <div class="checkout-form-section">
            <h2>Secure Checkout</h2>
            <form id="checkoutPaymentForm">
                <h3>Shipping Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="shipName" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="shipPhone" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <input type="text" id="shipAddress" required placeholder="123 Main St, Apartment 4B">
                </div>

                <h3 style="margin-top: 30px;">Payment Method</h3>
                <div class="payment-methods">
                    <div class="payment-method active" data-method="card">
                        <i class="fas fa-credit-card"></i> Credit/Debit Card
                    </div>
                    <div class="payment-method" data-method="upi">
                        <i class="fas fa-mobile-alt"></i> UPI
                    </div>
                </div>

                <div id="cardDetails" class="payment-details active">
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="XXXX XXXX XXXX XXXX" maxlength="19" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM/YY" maxlength="5" required>
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="password" placeholder="XXX" maxlength="3" required>
                        </div>
                    </div>
                </div>

                <div id="upiDetails" class="payment-details">
                    <div class="form-group">
                        <label>UPI ID</label>
                        <input type="text" placeholder="username@bank">
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-pay">Pay ₹<span id="payBtnAmount">0.00</span></button>
            </form>
        </div>

        <div class="order-summary-section">
            <h2>Order Summary</h2>
            <div id="checkoutItemsList">
                <!-- Items will be injected here -->
            </div>
            <div class="summary-total">
                <span>Total Amount:</span>
                <span>₹<span id="checkoutTotalAmount">0.00</span></span>
            </div>
        </div>
    </div>

    <!-- Bill Modal -->
    <div class="cart-modal" id="receiptModal" style="display: none;">
        <div class="cart-content" style="max-width: 500px; text-align: center;">
            <div class="cart-header" style="justify-content: center; border: none;">
                <h2 style="color: #4CAF50;"><i class="fas fa-check-circle" style="font-size: 50px; display: block; margin-bottom: 10px;"></i> Payment Successful!</h2>
            </div>
            <div class="cart-body">
                <p>Your order has been placed successfully. Thank you for choosing Foodie Delight!</p>
                <p>Order ID: <strong id="receiptOrderId">#12345</strong></p>
                
                <div class="tracking-container" style="margin-top: 30px; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px;">
                    <h3 id="trackingStatusText" style="font-size: 1.1em; color: #1e3c72; margin-bottom: 10px;">Order Received ✅</h3>
                    <div class="progress-bar-bg" style="width: 100%; height: 12px; background: #ddd; border-radius: 6px; overflow: hidden;">
                        <div id="trackingProgressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); transition: width 1s linear;"></div>
                    </div>
                </div>

                <button class="btn-primary" style="margin-top: 25px;" onclick="window.location.href='index.html'">Back to Home</button>
            </div>
        </div>
    </div>

    <script src="checkout.js"></script>
    <script src="script.js"></script> <!-- Load script.js for auth logic -->
</body>
</html>
