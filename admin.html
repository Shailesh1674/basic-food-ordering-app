<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Foodie Delight</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-layout { display: flex; min-height: calc(100vh - 80px); }
        .admin-sidebar { width: 250px; background: #2f3542; color: white; padding: 20px 0; }
        .admin-sidebar ul { list-style: none; padding: 0; }
        .admin-sidebar li { padding: 15px 25px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; }
        .admin-sidebar li:hover, .admin-sidebar li.active { background: #57606f; border-left-color: #ff4757; }
        .admin-sidebar i { margin-right: 10px; width: 20px; text-align: center; }
        .admin-content { flex: 1; background: #f1f2f6; padding: 30px; overflow-y: auto; }
        
        .admin-section { display: none; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .admin-section.active { display: block; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; }
        table th, table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        table th { background-color: #f8f9fa; font-weight: bold; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85em; font-weight: bold; }
        .status-Preparing { background: #ffeaa7; color: #fdcb6e; }
        .status-Out { background: #81ecec; color: #00cec9; }
        .status-Delivered { background: #55efc4; color: #00b894; }
        
        .action-btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; display: inline-flex; align-items: center; justify-content: center; margin-right: 5px; }
        .btn-edit { background: #3498db; }
        .btn-delete { background: #e74c3c; }
        .btn-status { background: #2ecc71; }
        
        /* Modal Styles for Menu Item */
        .admin-modal { background: rgba(0,0,0,0.5); display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; align-items: center; justify-content: center; }
        .admin-modal-content { background: white; padding: 30px; border-radius: 8px; width: 400px; max-width: 90%; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="img/logo.png" alt="Logo" onerror="this.src=''; this.alt='🍔'">
                <h1>Foodie Delight <span style="font-size: 0.5em; color: #ff4757; vertical-align: middle;">ADMIN</span></h1>
            </div>
            <nav>
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html">View Site</a></li>
                    <li><a href="#" id="adminLogout">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <ul>
                <li class="nav-tab active" data-target="dashboardSection">
                    <i class="fas fa-home"></i> Dashboard
                </li>
                <li class="nav-tab" data-target="ordersSection">
                    <i class="fas fa-shopping-bag"></i> Orders
                </li>
                <li class="nav-tab" data-target="menuSection">
                    <i class="fas fa-utensils"></i> Menu Items
                </li>
            </ul>
        </aside>

        <main class="admin-content">
            <!-- Dashboard Section -->
            <section id="dashboardSection" class="admin-section active">
                <div class="section-header">
                    <h2>Admin Dashboard</h2>
                </div>
                <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                    <div style="flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center;">
                        <i class="fas fa-shopping-cart" style="font-size: 40px; color: #3498db; margin-bottom: 10px;"></i>
                        <h3 id="statTotalOrders">0</h3>
                        <p>Total Orders</p>
                    </div>
                    <div style="flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center;">
                        <i class="fas fa-rupee-sign" style="font-size: 40px; color: #2ecc71; margin-bottom: 10px;"></i>
                        <h3 id="statTotalRevenue">₹0.00</h3>
                        <p>Total Revenue</p>
                    </div>
                    <div style="flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center;">
                        <i class="fas fa-utensils" style="font-size: 40px; color: #f1c40f; margin-bottom: 10px;"></i>
                        <h3 id="statTotalItems">0</h3>
                        <p>Menu Items</p>
                    </div>
                </div>
            </section>

            <!-- Orders Section -->
            <section id="ordersSection" class="admin-section">
                <div class="section-header">
                    <h2>Manage Orders</h2>
                </div>
                <div style="overflow-x: auto;">
                    <table id="ordersTable">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Date</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Orders will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Menu Items Section -->
            <section id="menuSection" class="admin-section">
                <div class="section-header">
                    <h2>Manage Menu Items</h2>
                    <button class="btn-primary" id="addMenuItemBtn"><i class="fas fa-plus"></i> Add Item</button>
                </div>
                <div style="overflow-x: auto;">
                    <table id="menuTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Menu items will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Add/Edit Menu Item Modal -->
    <div class="admin-modal" id="menuItemModal">
        <div class="admin-modal-content">
            <h2 id="modalTitle" style="margin-bottom: 20px;">Add Menu Item</h2>
            <form id="menuItemForm">
                <input type="hidden" id="itemId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="itemName" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="itemCategory" required>
                        <option value="pizza">Pizza</option>
                        <option value="burger">Burger</option>
                        <option value="sandwich">Sandwich</option>
                        <option value="beverage">Beverage</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" step="0.01" id="itemPrice" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="itemDescription" required>
                </div>
                <div class="form-group">
                    <label>Image URL (e.g., img/food/p1.jpg)</label>
                    <input type="text" id="itemImage" required placeholder="img/food/default.jpg">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn-primary" style="flex: 1;">Save</button>
                    <button type="button" class="btn-primary" id="cancelMenuBtn" style="flex: 1; background: #95a5a6;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
